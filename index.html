<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Počasie v Trnave</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --card: #ffffff; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg); margin: 0; padding: 20px; color: #334155; }
        .container { max-width: 900px; margin: 0 auto; }
        .card { background: var(--card); padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h1 { text-align: center; color: #1e293b; }
        h3 { margin-top: 0; color: #475569; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #e2e8f0; }
        th { background: #f1f5f9; }
        canvas { max-height: 300px; width: 100%; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Počasie v Trnave</h1>
        
        <div class="card">
            <h3>Vývoj priemernej teploty (posledných 30 dní)</h3>
            <canvas id="tempChart"></canvas>
        </div>

        <div class="card">
            <h3>Mesačné priemery</h3>
            <div id="monthly-table">Načítavam...</div>
        </div>

        <div class="card">
            <h3>Denné priemery</h3>
            <div id="summary-table">Načítavam...</div>
        </div>
    </div>

    <script>
        const monthNames = ["Január", "Február", "Marec", "Apríl", "Máj", "Jún", 
                            "Júl", "August", "September", "Október", "November", "December"];

        fetch('weather_daily.csv')
            .then(response => response.text())
            .then(csvData => {
                const rows = csvData.split(/\r?\n/).filter(row => row.trim() !== "");
                const monthlyStats = {};
                const chartLabels = [];
                const chartData = [];

                // Generovanie dennej tabuľky (v opačnom poradí)
                let dHtml = '<table><tr><th>Dátum</th><th>Priemer (°C)</th></tr>';
                
                // Prechádzame od konca po druhý riadok (vynecháme hlavičku)
                for (let i = rows.length - 1; i >= 1; i--) {
                    const [date, t7, t14, t21, avg] = rows[i].split(',');
                    const tempAvg = parseFloat(avg);
                    if (isNaN(tempAvg)) continue;

                    // Formátovanie dátumu na DD.MM.RRRR
                    const [y, m, d] = date.split('-');
                    const formattedDate = `${d}.${m}.${y}`;
                    
                    // Riadok do tabuľky
                    dHtml += `<tr><td>${formattedDate}</td><td>${tempAvg.toFixed(1)}</td></tr>`;

                    // Mesačné štatistiky (agregácia)
                    const monthKey = `${y}-${m}`;
                    if (!monthlyStats[monthKey]) monthlyStats[monthKey] = { sum: 0, count: 0 };
                    monthlyStats[monthKey].sum += tempAvg;
                    monthlyStats[monthKey].count += 1;

                    // Dáta pre graf (posledných 30 dní)
                    if (rows.length - i <= 30) {
                        chartLabels.unshift(formattedDate);
                        chartData.unshift(tempAvg);
                    }
                }
                document.getElementById('summary-table').innerHTML = dHtml + '</table>';

                // Vykreslenie mesačnej tabuľky
                let mHtml = '<table><tr><th>Mesiac</th><th>Priemer (°C)</th></tr>';
                Object.keys(monthlyStats).sort().reverse().forEach(mKey => {
                    const [y, mNum] = mKey.split('-');
                    const name = monthNames[parseInt(mNum) - 1];
                    const avg = (monthlyStats[mKey].sum / monthlyStats[mKey].count).toFixed(1);
                    mHtml += `<tr><td>${name} ${y}</td><td>${avg}</td></tr>`;
                });
                document.getElementById('monthly-table').innerHTML = mHtml + '</table>';

                // Vykreslenie grafu
                new Chart(document.getElementById('tempChart'), {
                    type: 'line',
                    data: {
                        labels: chartLabels,
                        datasets: [{ label: 'Priemerná teplota (°C)', data: chartData, borderColor: '#2563eb', tension: 0.3 }]
                    },
                    options: { responsive: true, maintainAspectRatio: false }
                });
            })
            .catch(err => {
                console.error("Chyba:", err);
                document.getElementById('summary-table').innerHTML = "Chyba pri načítaní dát.";
            });
    </script>
</body>
</html>
