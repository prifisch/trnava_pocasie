<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <title>Počasie v Trnave</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        table { border-collapse: collapse; width: 100%; margin-bottom: 40px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #4CAF50; color: white; }
        h2 { border-bottom: 2px solid #4CAF50; padding-bottom: 10px; }
    </style>
</head>
<body>
    <h1>Počasie v Trnave</h1>

    <h2>Denný priemer</h2>
    <div id="summary-table">Načítavam priemery...</div>

    <h2>Hodinový záznam (surové dáta)</h2>
    <div id="details-table">Načítavam záznamy...</div>

    <script>
        fetch('data.csv')
            .then(response => response.text())
            .then(csvData => {
                const rows = csvData.split('\n').filter(row => row.trim() !== "");
                const dailyStats = {};
                const allRows = [];

                // 1. Spracovanie dát
                for (let i = 1; i < rows.length; i++) {
                    const columns = rows[i].split(',');
                    const dateTime = columns[0];
                    const temp = parseFloat(columns[1]);
                    const date = dateTime.split(' ')[0];

                    // Uloženie pre surový výpis
                    allRows.push({ date: dateTime, temp: columns[1], rain: columns[2] });

                    // Výpočet priemeru
                    if (!dailyStats[date]) dailyStats[date] = { sum: 0, count: 0 };
                    dailyStats[date].sum += temp;
                    dailyStats[date].count += 1;
                }

                // 2. Vykreslenie Tabuľky priemerov
                let summaryHtml = '<table><thead><tr><th>Dátum</th><th>Priemerná teplota (°C)</th></tr></thead><tbody>';
                Object.keys(dailyStats).sort().reverse().forEach(date => {
                    const avg = (dailyStats[date].sum / dailyStats[date].count).toFixed(1);
                    summaryHtml += `<tr><td>${date}</td><td>${avg}</td></tr>`;
                });
                summaryHtml += '</tbody></table>';
                document.getElementById('summary-table').innerHTML = summaryHtml;

                // 3. Vykreslenie Tabuľky detailov
                let detailHtml = '<table><thead><tr><th>Dátum a čas</th><th>Teplota (°C)</th><th>Zrážky (mm)</th></tr></thead><tbody>';
                allRows.reverse().forEach(row => {
                    // Vytvoríme objekt dátum a povieme mu, že vstupný čas je UTC (pridaním 'Z')
                    const dateObj = new Date(row.date.replace(' ', 'T') + 'Z');
                    
                    // Prevedieme na čitateľný lokálny formát
                    const localDateTime = dateObj.toLocaleString('sk-SK', { 
                        year: 'numeric', month: '2-digit', day: '2-digit', 
                        hour: '2-digit', minute: '2-digit' 
                    });
                
                    detailHtml += `<tr><td>${localDateTime}</td><td>${row.temp}</td><td>${row.rain}</td></tr>`;
                });
                detailHtml += '</tbody></table>';
                document.getElementById('details-table').innerHTML = detailHtml;
            });
    </script>
</body>
</html>
